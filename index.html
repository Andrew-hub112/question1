<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Projectile Test</title>

<style>
body{font-family:Arial; background:#f4f4f4; padding:20px;}
.container{max-width:900px; margin:auto; background:white; padding:20px; border-radius:10px;}
.timer{font-size:18px; font-weight:bold; color:red;}
.question{margin-bottom:20px;}
textarea{width:100%; margin-top:5px;}
button{margin-top:20px; padding:10px;}
</style>
</head>

<body>

<div class="container">

<select id="lang" onchange="setLanguage()">
<option value="es">Español</option>
<option value="en">English</option>
</select>

<h2 id="title"></h2>
<div class="timer" id="timer">05:00</div>

<input type="text" id="name">

<div id="quiz"></div>

<button onclick="submitTest()" id="submitBtn"></button>

<div id="result"></div>

</div>

<script>

let lang="es";
let time=300;
let submitted=false;

// QUESTIONS
const data = {
es:[
{
q:"Una pelota es lanzada horizontalmente desde un edificio de 100 m y cae a 80 m de la base. ¿Rapidez inicial?",
opts:["42.4 m/s","17.9 m/s","22.1 m/s","35.4 m/s"],
a:"b"
},
{
q:"Se lanza un cuerpo con ángulo 45°. Si tarda 2 s en alcanzar altura máxima, ¿rapidez inicial?",
opts:["28.3 m/s","42.4 m/s","56.6 m/s","70.7 m/s"],
a:"a"
},
{
q:"Proyectil horizontal con v0=10 m/s alcanza 50 m. ¿Altura?",
opts:["125 m","150 m","80 m","50 m"],
a:"a"
}
],
en:[
{
q:"A ball is launched horizontally from a 100 m building and lands 80 m away. What was the initial speed?",
opts:["42.4 m/s","17.9 m/s","22.1 m/s","35.4 m/s"],
a:"b"
},
{
q:"A projectile is launched at 45°. If it takes 2 s to reach max height, what is the initial speed?",
opts:["28.3 m/s","42.4 m/s","56.6 m/s","70.7 m/s"],
a:"a"
},
{
q:"A horizontal projectile with v0=10 m/s travels 50 m. What is the height?",
opts:["125 m","150 m","80 m","50 m"],
a:"a"
}
]
};

// TEXT
const text = {
es:{
title:"Prueba Movimiento Parabólico",
submit:"Finalizar",
score:"Puntaje:",
name:"Nombre completo",
timeup:"Tiempo finalizado"
},
en:{
title:"Projectile Motion Test",
submit:"Finish",
score:"Score:",
name:"Full name",
timeup:"Time is over"
}
};

// LANGUAGE
function setLanguage(){
lang=document.getElementById("lang").value;
loadQuiz();
}

// LOAD QUIZ
function loadQuiz(){

document.getElementById("title").innerText=text[lang].title;
document.getElementById("submitBtn").innerText=text[lang].submit;
document.getElementById("name").placeholder=text[lang].name;

let html="";

data[lang].forEach((q,i)=>{

html+=`<div class="question">
<p>${i+1}) ${q.q}</p>`;

q.opts.forEach((opt,j)=>{
let letter=["a","b","c","d"][j];
html+=`<label><input type="radio" name="q${i}" value="${letter}"> ${letter}) ${opt}</label><br>`;
});

html+=`<textarea id="j${i}" placeholder="Justificación / Justification"></textarea>
</div>`;

});

document.getElementById("quiz").innerHTML=html;
}

// SUBMIT
function submitTest(){

if(submitted) return;

if(time<=0){
alert(text[lang].timeup);
}

let name=document.getElementById("name").value;
if(!name){
alert(lang==="es"?"Ingrese su nombre":"Write your name");
return;
}

submitted=true;

// CALCULATE
let correct=0;

data[lang].forEach((q,i)=>{
let selected=document.querySelector(`input[name="q${i}"]:checked`);
if(selected && selected.value===q.a) correct++;
});

let maxScore=4.0;
let baseScore=(correct/data[lang].length)*maxScore;
let visibleScore=(baseScore*0.6).toFixed(1);

// SHOW RESULT
document.getElementById("result").innerHTML=
`${text[lang].score} ${visibleScore} / 4.0 (60% provisional)`;

// DISABLE INPUTS
document.querySelectorAll("input,textarea,button,select").forEach(e=>e.disabled=true);

// EMAIL BODY
let body=`Name: ${name}

Correct answers: ${correct}/${data[lang].length}

Raw score (100%): ${baseScore.toFixed(2)}/4.0
Student visible score (60%): ${visibleScore}/4.0

Justifications:
`;

data[lang].forEach((q,i)=>{
let ans=document.querySelector(`input[name="q${i}"]:checked`);
body+=`Q${i+1}: ${ans?ans.value:"No answer"}

${document.getElementById("j"+i).value}

`;
});

// SEND EMAIL
window.location.href=`mailto:mauri.diaz@uandresbello.edu?subject=Test ${name}&body=${encodeURIComponent(body)}`;

}

// TIMER
let timerInterval=setInterval(()=>{

if(submitted){
clearInterval(timerInterval);
return;
}

let m=Math.floor(time/60);
let s=time%60;

document.getElementById("timer").innerText=
`${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;

if(time<=0){
submitTest();
clearInterval(timerInterval);
return;
}

time--;

},1000);

// INIT
loadQuiz();

</script>

</body>
</html>
